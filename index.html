<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NAGeo — Hub</title>
<link rel="icon" type="image/png" sizes="48x48" href="icons/favicon-48.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="shortcut icon" href="icons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="manifest" href="icons/manifest.json">
<meta name="theme-color" content="#0f2341">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NAGeo Hub">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#060d1a;--navy2:#0d1f38;--navy3:#123055;
  --green:#43a047;--green-light:#8fe396;--green-deep:#1b6b2e;
  --text:#f4f7fc;--text-dim:rgba(244,247,252,.58);--text-dimmer:rgba(244,247,252,.34);
  --glass:rgba(255,255,255,.045);--glass-border:rgba(255,255,255,.08);--glass-hover:rgba(255,255,255,.075);
  --radius:18px;
}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  color:var(--text);
  background:
    radial-gradient(ellipse 900px 500px at 12% -8%, rgba(67,160,71,.16), transparent 55%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(18,48,85,.5), transparent 60%),
    radial-gradient(ellipse 800px 600px at 50% 120%, rgba(27,107,46,.1), transparent 60%),
    linear-gradient(175deg,var(--navy) 0%,#081527 45%,var(--navy) 100%);
  background-attachment:fixed;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* faint dot-grid texture for depth */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
  background-size:26px 26px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 0%, #000 20%, transparent 75%);
}
/* subtle ambient orbs, green only, slow drift */
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;}
.orb1{width:480px;height:480px;background:var(--green-deep);top:-160px;right:-140px;opacity:.22;animation:drift1 22s ease-in-out infinite;}
.orb2{width:380px;height:380px;background:var(--navy3);bottom:-180px;left:-120px;opacity:.5;animation:drift2 26s ease-in-out infinite;}
@keyframes drift1{0%,100%{transform:translate(0,0);}50%{transform:translate(-24px,28px);}}
@keyframes drift2{0%,100%{transform:translate(0,0);}50%{transform:translate(26px,-20px);}}
@media (prefers-reduced-motion:reduce){.orb{animation:none;}}

.wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:3rem 2rem 4rem;}

/* header */
.hdr{display:flex;align-items:flex-end;justify-content:space-between;gap:1.5rem;margin-bottom:2.8rem;flex-wrap:wrap;
  animation:fadeUp .5s ease both;}
.brand{display:flex;align-items:center;gap:13px;}
.brand-badge{width:44px;height:44px;border-radius:12px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.06);flex-shrink:0;}
.brand-badge img{width:100%;height:100%;object-fit:cover;display:block;}
.brand-name{font-size:12.5px;font-weight:700;color:var(--text-dimmer);letter-spacing:1.2px;text-transform:uppercase;}
.greeting{font-size:33px;font-weight:700;letter-spacing:-.6px;margin-top:3px;}
.greeting span{background:linear-gradient(90deg,#fff,var(--green-light));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.clock{text-align:right;color:var(--text-dimmer);font-size:12.5px;}
.clock .time{font-size:21px;font-weight:600;color:var(--text-dim);font-variant-numeric:tabular-nums;letter-spacing:-.2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* search */
.search-row{margin-bottom:2rem;position:relative;max-width:400px;
  animation:fadeUp .5s ease .05s both;}
.search-row input{
  width:100%;padding:12px 16px 12px 40px;border-radius:12px;
  border:1px solid var(--glass-border);background:var(--glass);
  color:var(--text);font-size:13.5px;font-family:inherit;backdrop-filter:blur(14px);
  transition:all .15s;
}
.search-row input::placeholder{color:var(--text-dimmer);}
.search-row input:focus{outline:none;border-color:rgba(67,160,71,.55);background:rgba(67,160,71,.06);box-shadow:0 0 0 3px rgba(67,160,71,.1);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4;font-size:13px;pointer-events:none;}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:14px;}
.card{
  position:relative;overflow:hidden;
  background:linear-gradient(155deg, var(--glass), rgba(255,255,255,.02));
  border:1px solid var(--glass-border);border-radius:var(--radius);
  padding:20px 20px 18px;backdrop-filter:blur(18px);
  text-decoration:none;color:inherit;display:block;
  transition:transform .25s cubic-bezier(.2,.8,.2,1), background .25s, border-color .25s, box-shadow .25s;
  cursor:pointer;
  animation:fadeUp .5s ease both;
}
.card::after{
  content:'';position:absolute;top:0;left:14px;right:14px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent);
}
.card:hover{
  transform:translateY(-5px);
  background:linear-gradient(155deg, var(--glass-hover), rgba(255,255,255,.03));
  border-color:rgba(143,227,150,.28);
  box-shadow:0 22px 44px rgba(0,0,0,.4), 0 0 0 1px rgba(67,160,71,.08), 0 0 30px rgba(67,160,71,.06);
}
.card::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;
  background:radial-gradient(360px circle at var(--mx,50%) var(--my,0%), rgba(143,227,150,.09), transparent 60%);
  pointer-events:none;
}
.card:hover::before{opacity:1;}
.card-icon{
  width:52px;height:52px;border-radius:13px;overflow:hidden;
  margin-bottom:15px;box-shadow:0 8px 18px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.06);
  transition:transform .25s;
}
.card:hover .card-icon{transform:scale(1.04);}
.card-icon img{width:100%;height:100%;object-fit:cover;display:block;}
.card-title{font-size:15.5px;font-weight:700;margin-bottom:5px;letter-spacing:-.2px;}
.card-desc{font-size:12.5px;color:var(--text-dim);line-height:1.5;margin-bottom:15px;min-height:36px;}
.card-foot{display:flex;align-items:center;justify-content:space-between;}
.card-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:4px 9px;border-radius:20px;background:rgba(67,160,71,.14);color:var(--green-light);border:1px solid rgba(67,160,71,.18);}
.card-arrow{font-size:15px;color:var(--text-dimmer);transition:transform .2s, color .2s;}
.card:hover .card-arrow{transform:translateX(3px);color:var(--green-light);}

/* footer */
.footer{margin-top:2.6rem;text-align:center;color:var(--text-dimmer);font-size:11.5px;letter-spacing:.2px;}
.footer a{color:var(--text-dim);text-decoration:none;border-bottom:1px dotted rgba(255,255,255,.2);}
.footer a:hover{color:var(--green-light);border-color:rgba(143,227,150,.4);}

/* schedule strip */
.sched{margin-top:2.8rem;animation:fadeUp .5s ease .1s both;}
.sched-hdr{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.sched-title{font-size:18px;font-weight:700;letter-spacing:-.3px;flex:1;}
.sched-range{font-size:12.5px;color:var(--text-dimmer);}
.sched-nav{display:flex;gap:6px;}
.sched-nav button{
  width:30px;height:30px;border-radius:9px;border:1px solid var(--glass-border);background:var(--glass);
  color:var(--text-dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-family:inherit;
}
.sched-nav button:hover{background:rgba(67,160,71,.14);border-color:rgba(67,160,71,.35);color:var(--green-light);}
.sched-today-btn{
  font-size:11.5px;font-weight:600;padding:0 12px;border-radius:9px;border:1px solid var(--glass-border);
  background:var(--glass);color:var(--text-dim);cursor:pointer;font-family:inherit;transition:all .15s;
}
.sched-today-btn:hover{background:rgba(67,160,71,.14);border-color:rgba(67,160,71,.35);color:var(--green-light);}
.sched-tv-btn{
  font-size:12px;font-weight:700;padding:7px 14px;border-radius:9px;border:1px solid rgba(67,160,71,.3);
  background:rgba(67,160,71,.12);color:var(--green-light);cursor:pointer;font-family:inherit;transition:all .15s;
}
.sched-tv-btn:hover{background:rgba(67,160,71,.22);border-color:rgba(67,160,71,.5);}
.sched-state{font-size:12.5px;color:var(--text-dimmer);padding:1.5rem;text-align:center;}
.sched-state a{color:var(--green-light);}

/* mini live carousel — same slide engine as TV Mode, scaled down and inline.
   Reuses the .tv-* slide classes (defined below) via the .mini-tv scope so
   both sizes render identical markup and never drift out of sync. */
.mini-tv{
  background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;
  padding:16px 18px 14px;backdrop-filter:blur(16px);
}
.mini-slide-wrap{display:flex;flex-direction:column;height:270px;}
.mini-controls{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;}
.mini-ctrl-btn{
  width:32px;height:32px;border-radius:9px;border:1px solid var(--glass-border);background:var(--glass);
  color:var(--text-dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-family:inherit;
}
.mini-ctrl-btn:hover{background:rgba(67,160,71,.18);border-color:rgba(67,160,71,.4);color:var(--green-light);}
.mini-ctrl-btn.primary{background:rgba(67,160,71,.16);border-color:rgba(67,160,71,.35);color:var(--green-light);}
.mini-tv .tv-slide-hdr{margin-bottom:10px;}
.mini-tv .tv-slide-day{font-size:10.5px;letter-spacing:1.3px;margin-bottom:4px;}
.mini-tv .tv-slide-tech{font-size:19px;gap:10px;}
.mini-tv .tv-slide-tech-avatar{width:32px;height:32px;font-size:12px;border-radius:9px;}
.mini-tv .tv-slide-count{font-size:11.5px;margin-left:2px;}
.mini-tv .tv-body{gap:14px;}
.mini-tv .tv-job-card{padding:11px 13px;border-radius:12px;border-left-width:3px;}
.mini-tv .tv-job-time{font-size:12.5px;margin-bottom:2px;}
.mini-tv .tv-job-cust{font-size:13.5px;margin-bottom:2px;}
.mini-tv .tv-job-addr{font-size:11px;margin-bottom:4px;}
.mini-tv .tv-job-type{font-size:9px;padding:2px 7px;}
.mini-tv .tv-job-notes{font-size:11px;margin-top:5px;}
.mini-tv .tv-map{border-radius:13px;}
.mini-tv .tv-empty-day-icon{font-size:32px;}
.mini-tv .tv-empty-day-text{font-size:12.5px;}
.mini-tv .tv-progress{padding:0 0 10px;position:static;}
.mini-tv .tv-dot{height:3px;}
@media(max-width:700px){
  .mini-slide-wrap{height:auto;}
  .mini-tv .tv-body{grid-template-columns:1fr;}
  .mini-tv .tv-map{min-height:160px;}
}

/* ── TV MODE: full-screen auto-advancing wallboard ── */
.tv{position:fixed;inset:0;z-index:100;background:var(--navy);display:none;flex-direction:column;overflow:hidden;}
.tv.open{display:flex;}
.tv-bg{position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 1000px 600px at 15% 0%, rgba(67,160,71,.14), transparent 55%),
    radial-gradient(ellipse 900px 700px at 100% 100%, rgba(18,48,85,.5), transparent 60%),
    linear-gradient(175deg,var(--navy) 0%,#081527 50%,var(--navy) 100%);
}
.tv-top{position:relative;z-index:2;display:flex;align-items:center;gap:16px;padding:22px 40px 10px;flex-shrink:0;}
.tv-top-badge{width:42px;height:42px;border-radius:11px;overflow:hidden;flex-shrink:0;}
.tv-top-badge img{width:100%;height:100%;object-fit:cover;display:block;}
.tv-top-title{font-size:15px;font-weight:700;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:1.5px;}
.tv-top-clock{margin-left:auto;font-size:20px;color:var(--text-dim);font-variant-numeric:tabular-nums;}
.tv-exit{
  margin-left:16px;width:38px;height:38px;border-radius:10px;border:1px solid var(--glass-border);
  background:var(--glass);color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;transition:all .15s;
}
.tv-exit:hover{background:rgba(220,38,38,.18);border-color:rgba(220,38,38,.4);color:#fca5a5;}

.tv-slide-wrap{position:relative;z-index:1;flex:1;min-height:0;padding:10px 40px 30px;display:flex;flex-direction:column;}
.tv-slide-hdr{margin-bottom:20px;}
.tv-slide-day{font-size:15px;font-weight:700;color:var(--green-light);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;}
.tv-slide-tech{font-size:44px;font-weight:800;letter-spacing:-1px;display:flex;align-items:center;gap:16px;}
.tv-slide-tech-avatar{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--green),var(--green-deep));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;flex-shrink:0;box-shadow:0 8px 24px rgba(67,160,71,.3);}
.tv-slide-count{font-size:16px;color:var(--text-dim);font-weight:500;margin-left:4px;}

.tv-body{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:26px;}
.tv-jobs{overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-right:8px;}
.tv-job-card{
  background:linear-gradient(155deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
  border:1px solid var(--glass-border);border-radius:18px;padding:20px 24px;
  border-left:4px solid var(--green);
}
.tv-job-time{font-size:22px;font-weight:800;color:var(--green-light);margin-bottom:6px;letter-spacing:-.3px;}
.tv-job-cust{font-size:24px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px;}
.tv-job-addr{font-size:15px;color:var(--text-dim);margin-bottom:8px;}
.tv-job-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.tv-job-type{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:4px 10px;border-radius:20px;background:rgba(67,160,71,.16);color:var(--green-light);}
.tv-job-notes{font-size:14px;color:var(--text-dim);margin-top:8px;line-height:1.5;font-style:italic;}
.tv-map{border-radius:20px;overflow:hidden;border:1px solid var(--glass-border);background:rgba(255,255,255,.03);min-height:0;position:relative;}
.tv-map iframe{width:100%;height:100%;border:0;filter:saturate(.85) brightness(.92);}
.tv-map-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--text-dimmer);font-size:14px;}

.tv-empty-day{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--text-dimmer);}
.tv-empty-day-icon{font-size:56px;opacity:.4;}
.tv-empty-day-text{font-size:20px;}

.tv-progress{position:relative;z-index:2;display:flex;gap:6px;padding:0 40px 18px;flex-shrink:0;}
.tv-dot{flex:1;height:4px;border-radius:3px;background:rgba(255,255,255,.1);overflow:hidden;}
.tv-dot-fill{height:100%;width:0%;background:var(--green);border-radius:3px;}
.tv-dot.done .tv-dot-fill{width:100%;}
.tv-dot.active .tv-dot-fill{width:var(--pct,0%);transition:width linear;}

.tv-controls{position:fixed;z-index:3;bottom:26px;right:40px;display:flex;align-items:center;gap:10px;}
.tv-ctrl-btn{
  width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,.15);
  background:rgba(10,20,35,.7);backdrop-filter:blur(10px);color:var(--text);font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.tv-ctrl-btn:hover{background:rgba(67,160,71,.28);border-color:rgba(67,160,71,.5);}
.tv-ctrl-btn.primary{width:56px;height:56px;font-size:20px;background:rgba(67,160,71,.25);border-color:rgba(67,160,71,.5);}
.tv-ctrl-btn.primary:hover{background:rgba(67,160,71,.4);}
.tv-nav-arrows{display:none;gap:10px;}
.tv-nav-arrows.show{display:flex;}

@media(max-width:900px){
  .tv-body{grid-template-columns:1fr;}
  .tv-map{min-height:220px;}
  .tv-slide-tech{font-size:30px;}
}

/* embedded tool viewer */
.viewer{position:fixed;inset:0;z-index:50;background:var(--navy);display:none;flex-direction:column;}
.viewer.open{display:flex;}
.viewer-bar{
  height:56px;flex-shrink:0;display:flex;align-items:center;gap:14px;padding:0 18px;
  background:linear-gradient(90deg,var(--navy2),var(--navy3));
  border-bottom:1px solid rgba(255,255,255,.08);
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.back-btn{
  display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--text);
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;
  flex-shrink:0;
}
.back-btn:hover{background:rgba(76,175,80,.22);border-color:rgba(76,175,80,.4);}
.viewer-icon{width:26px;height:26px;border-radius:7px;overflow:hidden;flex-shrink:0;}
.viewer-icon img{width:100%;height:100%;object-fit:cover;display:block;}
.viewer-title{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.viewer-newtab{color:var(--text-dim);font-size:12px;text-decoration:none;padding:6px 10px;border-radius:8px;flex-shrink:0;white-space:nowrap;}
.viewer-newtab:hover{color:var(--text);background:rgba(255,255,255,.06);}
.viewer-frame{flex:1;border:0;width:100%;background:#fff;}

@media(max-width:600px){
  .wrap{padding:2rem 1.2rem 3rem;}
  .hdr{flex-direction:column;align-items:flex-start;}
  .greeting{font-size:26px;}
  .clock{text-align:left;}
  .viewer-title{display:none;}
}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="wrap">
  <div class="hdr">
    <div>
      <div class="brand">
        <div class="brand-badge"><img src="icons/icon-hub.png" alt="NAGeo"></div>
        <div class="brand-name">North American Geothermal</div>
      </div>
      <div class="greeting" id="greeting">Good day, <span>team</span>.</div>
    </div>
    <div class="clock">
      <div id="clockDate">—</div>
      <div class="time" id="clockTime">--:--</div>
    </div>
  </div>

  <div class="search-row">
    <span class="search-icon">🔍</span>
    <input type="text" id="filterInput" placeholder="Search tools…" autocomplete="off">
  </div>

  <div class="grid" id="grid"></div>

  <div class="sched">
    <div class="sched-hdr">
      <div class="sched-title">Live Schedule</div>
      <div class="sched-range" id="schedRange"></div>
      <button class="sched-today-btn" onclick="jumpToToday()">Today</button>
      <div class="sched-nav">
        <button onclick="shiftWeek(-1)" title="Previous week">←</button>
        <button onclick="shiftWeek(1)" title="Next week">→</button>
      </div>
      <button class="sched-tv-btn" onclick="openTVMode()">📺 TV Mode</button>
    </div>
    <div class="mini-tv" id="miniTvWrap">
      <div class="tv-progress" id="miniProgress"></div>
      <div class="mini-slide-wrap" id="miniSlideWrap"><div class="tv-empty-day"><div class="tv-empty-day-icon">📡</div><div class="tv-empty-day-text">Loading schedule…</div></div></div>
      <div class="mini-controls">
        <div class="tv-nav-arrows" id="miniArrows">
          <button class="mini-ctrl-btn" onclick="slidePrev()" title="Previous">←</button>
          <button class="mini-ctrl-btn" onclick="slideNext()" title="Next">→</button>
        </div>
        <button class="mini-ctrl-btn primary" id="miniPlayBtn" onclick="slideTogglePlay()" title="Pause / resume">⏸</button>
      </div>
    </div>
  </div>

  <div class="footer">NAGeo Hub &middot; six tools, one front door &middot; <a href="#" id="editLinksNote">edit URLs in index.html</a></div>
</div>

<div class="viewer" id="viewer">
  <div class="viewer-bar">
    <button class="back-btn" id="backBtn" onclick="closeViewer()">← Back to Hub</button>
    <div class="viewer-icon" id="viewerIcon"><img src="" alt=""></div>
    <div class="viewer-title" id="viewerTitle"></div>
    <a class="viewer-newtab" id="viewerNewTab" href="#" target="_blank" rel="noopener">Open in new tab ↗</a>
  </div>
  <iframe class="viewer-frame" id="viewerFrame" src="" title="Tool viewer"></iframe>
</div>

<div class="tv" id="tv">
  <div class="tv-bg"></div>
  <div class="tv-top">
    <div class="tv-top-badge"><img src="icons/icon-hub.png" alt="NAGeo"></div>
    <div class="tv-top-title">Today's Routes — NAGeo</div>
    <div class="tv-top-clock" id="tvClock">--:--</div>
    <button class="tv-exit" onclick="closeTVMode()" title="Exit TV Mode (Esc)">✕</button>
  </div>
  <div class="tv-progress" id="tvProgress"></div>
  <div class="tv-slide-wrap" id="tvSlideWrap"></div>
  <div class="tv-controls">
    <div class="tv-nav-arrows" id="tvArrows">
      <button class="tv-ctrl-btn" onclick="slidePrev()" title="Previous">←</button>
      <button class="tv-ctrl-btn" onclick="slideNext()" title="Next">→</button>
    </div>
    <button class="tv-ctrl-btn primary" id="tvPlayBtn" onclick="tvTogglePlay()" title="Pause / resume">⏸</button>
  </div>
</div>

<script>
// ── Edit these to point at your real GitHub Pages URLs.
// Icon files expected in an /icons folder next to this index.html — see filenames below.
var TOOLS = [
  { name:"NAGeo Files",          desc:"Customer document storage & file management", icon:"icons/icon-files.png",      tag:"Files",     url:"https://northamericangeothermal.github.io/nageo-files/" },
  { name:"Install Tracker",      desc:"Geothermal install milestone tracking",        icon:"icons/icon-install.png",    tag:"Install",   url:"https://northamericangeothermal.github.io/nageo-tracker/" },
  { name:"Prospect ID Log",      desc:"Prospect & service lead intake log",           icon:"icons/icon-idlog.png",      tag:"Sales",     url:"https://northamericangeothermal.github.io/prospect-id-log/" },
  { name:"NAGeo Leases",         desc:"CSG lease document & compliance tracking",     icon:"icons/icon-leases.png",     tag:"Leases",    url:"https://northamericangeothermal.github.io/lease-tracker/" },
  { name:"Invoices & Cashflow",  desc:"Invoices, payables & cash flow",               icon:"icons/icon-cashflow.png",   tag:"Finance",   url:"https://northamericangeothermal.github.io/Invoices/" },
  { name:"Team Texting",         desc:"Internal team SMS & broadcast messaging",      icon:"icons/icon-texting.png",    tag:"Team",      url:"https://northamericangeothermal.github.io/Nageo-call-alerts/" }
];

function renderGrid(list) {
  var grid = document.getElementById('grid');
  if (!list.length) { grid.innerHTML = '<div style="color:var(--text-dimmer);padding:2rem 0;">No tools match.</div>'; return; }
  grid.innerHTML = list.map(function(t, i) {
    var realIdx = TOOLS.indexOf(t);
    return '<a class="card" href="'+t.url+'" data-idx="'+realIdx+'" style="animation-delay:'+(i*0.05)+'s" onclick="return openTool(event,'+realIdx+')" onmousemove="cardGlow(event)">'
      + '<div class="card-icon"><img src="'+t.icon+'" alt="'+t.name+'" onerror="this.parentElement.innerHTML=\'📦\';this.parentElement.style.display=\'flex\';this.parentElement.style.alignItems=\'center\';this.parentElement.style.justifyContent=\'center\';this.parentElement.style.fontSize=\'24px\';this.parentElement.style.background=\'rgba(255,255,255,.06)\';"></div>'
      + '<div class="card-title">'+t.name+'</div>'
      + '<div class="card-desc">'+t.desc+'</div>'
      + '<div class="card-foot"><span class="card-tag">'+t.tag+'</span><span class="card-arrow">→</span></div>'
      + '</a>';
  }).join('');
}
function cardGlow(e) {
  var r = e.currentTarget.getBoundingClientRect();
  e.currentTarget.style.setProperty('--mx', (e.clientX - r.left) + 'px');
  e.currentTarget.style.setProperty('--my', (e.clientY - r.top) + 'px');
}
document.getElementById('filterInput').addEventListener('input', function() {
  var q = this.value.toLowerCase();
  renderGrid(TOOLS.filter(function(t){ return (t.name+' '+t.desc+' '+t.tag).toLowerCase().includes(q); }));
});
renderGrid(TOOLS);

// ── In-hub viewer: opens the tool in an embedded iframe with its own back button ──
function openTool(e, idx) {
  if (e) { if (e.metaKey || e.ctrlKey || e.shiftKey) return true; e.preventDefault(); } // let cmd/ctrl-click still open a real new tab
  var t = TOOLS[idx];
  if (!t || t.url === '#') return false;
  document.getElementById('viewerIcon').querySelector('img').src = t.icon;
  document.getElementById('viewerTitle').textContent = t.name;
  document.getElementById('viewerNewTab').href = t.url;
  document.getElementById('viewerFrame').src = t.url;
  document.getElementById('viewer').classList.add('open');
  history.pushState({ nageoViewer: true }, '', '#' + t.tag.toLowerCase());
  return false;
}
function closeViewer() {
  document.getElementById('viewer').classList.remove('open');
  document.getElementById('viewerFrame').src = 'about:blank'; // stop background activity when leaving
  if (location.hash) history.pushState({}, '', location.pathname);
}
window.addEventListener('popstate', function() {
  if (!(history.state && history.state.nageoViewer)) closeViewer();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('viewer').classList.contains('open')) closeViewer();
});

// ══════════════════════════════════════════════════════════
// LIVE SCHEDULE — one shared slide engine, rendered at two sizes.
// A compact carousel is embedded right on the hub page, and "TV Mode" is
// the exact same live slide blown up full-screen for an office TV. They
// share one index/timer, so pausing or paging one does it to both — it's
// the same live view, just a different window size onto it.
// Pulls "who's going where" from a Supabase Edge Function that proxies
// Housecall Pro (see nageo-hub-schedule-function.ts for the backend code —
// a browser can't safely call HCP directly since that needs your API key).
// ══════════════════════════════════════════════════════════
var SCHEDULE_API_URL = "https://hpgwwegjsxyxovdattoc.supabase.co/functions/v1/quick-responder";
var SCHEDULE_ANON_KEY = "sb_publishable_D2PqYQoJjZ8koEM9NPvmeg_KB_Wa66H"; // sent as a Bearer token
var DEMO_SCHEDULE = false;  // set back to true any time to preview with sample data instead

var weekOffset = 0;

function startOfWeek(d) {
  var x = new Date(d);
  var day = x.getDay(); // 0=Sun
  var diff = day === 0 ? -6 : 1 - day; // Monday as start
  x.setDate(x.getDate() + diff);
  x.setHours(0,0,0,0);
  return x;
}
function fmtISO(d) { return d.toISOString().slice(0,10); }
function fmtDayLabel(d) { return d.toLocaleDateString('en-US',{weekday:'short'}); }
function fmtDateLabel(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function isSameDay(a,b) { return fmtISO(a) === fmtISO(b); }

function demoJobsFor(dateStr, idx) {
  // Sample data so the strip (and TV Mode) look right before the real endpoint is wired up.
  var pool = [
    [{time:"8:00 – 9:00 AM", customer:"Gary H. — Fairfax, VA", address:"11530 Valley Rd, Fairfax, VA 22033", tech:"Mike R.", type:"Service call", notes:"Annual maintenance check, WaterFurnace 7 Series."},
     {time:"10:30 – 11:30 AM", customer:"Reyes residence — Fairfax, VA", address:"4200 Legato Rd, Fairfax, VA 22033", tech:"Mike R.", type:"Repair", notes:"No heat call, check fault code."},
     {time:"1:00 – 2:30 PM", customer:"Bell residence — Fairfax, VA", address:"9990 Fairfax Blvd, Fairfax, VA 22030", tech:"Mike R.", type:"Service call", notes:"Filter + coil cleaning."}],
    [{time:"9:30 – 12:00 PM", customer:"Torres residence — Vienna, VA", address:"144 Maple Ave, Vienna, VA 22180", tech:"Dana P.", type:"Install", notes:"Loop field completion, day 2 of 3."},
     {time:"1:00 – 3:00 PM", customer:"Chen residence — Oakton, VA", address:"2946 Hunter Mill Rd, Oakton, VA 22124", tech:"Sam W.", type:"Repair", notes:"Compressor diagnostic."}],
    [],
    [{time:"7:30 – 9:00 AM", customer:"Patel residence — Reston, VA", address:"11700 Plaza America Dr, Reston, VA 20190", tech:"Dana P.", type:"Install", notes:"Equipment installation, startup scheduled after."},
     {time:"9:30 – 10:30 AM", customer:"Nguyen residence — Reston, VA", address:"1801 Reston Pkwy, Reston, VA 20190", tech:"Dana P.", type:"Service call", notes:"Thermostat replacement."}],
    [{time:"10:00 – 11:30 AM", customer:"Foster residence — McLean, VA", address:"1364 Beverly Rd, McLean, VA 22101", tech:"Sam W.", type:"Service call", notes:""}]
  ];
  return pool[idx % pool.length] || [];
}

async function fetchScheduleWeek(weekStartDate) {
  var start = fmtISO(weekStartDate);
  var endD = new Date(weekStartDate); endD.setDate(endD.getDate()+6);
  var end = fmtISO(endD);
  if (DEMO_SCHEDULE || !SCHEDULE_API_URL) {
    var byDate = {};
    for (var i=0;i<7;i++){
      var d = new Date(weekStartDate); d.setDate(d.getDate()+i);
      byDate[fmtISO(d)] = demoJobsFor(fmtISO(d), i);
    }
    return byDate;
  }
  var res = await fetch(SCHEDULE_API_URL + '?start=' + start + '&end=' + end, {
    headers: SCHEDULE_ANON_KEY ? { 'Authorization': 'Bearer ' + SCHEDULE_ANON_KEY } : {}
  });
  if (!res.ok) throw new Error('Schedule fetch failed (' + res.status + ')');
  var data = await res.json();
  var grouped = {};
  (data.jobs || []).forEach(function(j) {
    if (!grouped[j.date]) grouped[j.date] = [];
    grouped[j.date].push(j);
  });
  return grouped;
}

// ══════════════════════════════════════════════════════════
// SHARED SLIDE ENGINE — one tech's day at a time, auto-advancing, with a
// keyless Google Maps route between that tech's stops. Rendered into
// whichever container(s) exist right now: the inline mini carousel,
// the full-screen TV Mode overlay, or both at once.
// ══════════════════════════════════════════════════════════
var TV_SLIDE_MS = 9000; // how long each slide stays up before auto-advancing
var tvSlides = [];
var tvIndex = 0;
var tvPlaying = true;
var tvAdvanceTimer = null;
var tvClockTimer = null;

async function loadWeekSlides() {
  var weekStart = startOfWeek(new Date());
  weekStart.setDate(weekStart.getDate() + weekOffset*7);
  var weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate()+6);
  document.getElementById('schedRange').textContent = fmtDateLabel(weekStart) + ' – ' + fmtDateLabel(weekEnd);

  setSlideContainers('<div class="tv-empty-day"><div class="tv-empty-day-icon">📡</div><div class="tv-empty-day-text">Loading schedule…</div></div>');
  var byDate;
  try {
    byDate = await fetchScheduleWeek(weekStart);
  } catch (err) {
    setSlideContainers('<div class="tv-empty-day"><div class="tv-empty-day-icon">⚠️</div><div class="tv-empty-day-text">Couldn\'t load the schedule.<br>(' + err.message + ')</div></div>');
    return;
  }

  tvSlides = buildTVSlides(byDate, weekStart);
  tvIndex = 0;
  if (weekOffset === 0) {
    var idx = tvSlides.findIndex(function(s){ return s.isToday; });
    if (idx !== -1) tvIndex = idx;
  }
  renderProgressDots();
  renderCurrentSlide();
  if (tvPlaying) startTVAutoplay();
}
function shiftWeek(delta) { weekOffset += delta; loadWeekSlides(); }
function jumpToToday() { weekOffset = 0; loadWeekSlides(); }
loadWeekSlides();
setInterval(function(){ if (weekOffset === 0) loadWeekSlides(); }, 5*60*1000); // refresh current week every 5 min

function setSlideContainers(html) {
  var mini = document.getElementById('miniSlideWrap');
  var tv = document.getElementById('tvSlideWrap');
  if (mini) mini.innerHTML = html;
  if (tv) tv.innerHTML = html;
}

function initials(name) {
  return (name||'').split(' ').map(function(w){ return w[0]||''; }).join('').toUpperCase().slice(0,2) || '?';
}
function mapEmbedUrl(stops) {
  var clean = (stops||[]).filter(Boolean);
  if (!clean.length) return null;
  if (clean.length === 1) return 'https://www.google.com/maps?q=' + encodeURIComponent(clean[0]) + '&output=embed';
  var origin = encodeURIComponent(clean[0]);
  var rest = clean.slice(1).map(encodeURIComponent).join('+to:');
  return 'https://www.google.com/maps?saddr=' + origin + '&daddr=' + rest + '&output=embed';
}

function buildTVSlides(byDate, weekStart) {
  var slides = [];
  var today = new Date();
  for (var i=0;i<7;i++) {
    var d = new Date(weekStart); d.setDate(d.getDate()+i);
    var key = fmtISO(d);
    var jobs = byDate[key] || [];
    var dayMeta = { dayLabel: isSameDay(d,today) ? 'Today' : fmtDayLabel(d), dateLabel: fmtDateLabel(d), isToday: isSameDay(d,today) };
    if (!jobs.length) {
      slides.push(Object.assign({ empty:true }, dayMeta));
      continue;
    }
    var techOrder = [];
    var byTech = {};
    jobs.forEach(function(j) {
      var t = j.tech || 'Unassigned';
      if (!byTech[t]) { byTech[t] = []; techOrder.push(t); }
      byTech[t].push(j);
    });
    techOrder.forEach(function(t) {
      slides.push(Object.assign({ tech:t, jobs: byTech[t], stops: byTech[t].map(function(j){return j.address;}) }, dayMeta));
    });
  }
  return slides;
}

function openTVMode() {
  document.getElementById('tv').classList.add('open');
  renderCurrentSlide(); // TV Mode just displays whatever slide the mini carousel is already on
  if (!tvClockTimer) { updateTVClock(); tvClockTimer = setInterval(updateTVClock, 15000); }
  try { document.documentElement.requestFullscreen && document.documentElement.requestFullscreen().catch(function(){}); } catch(e){}
}
function closeTVMode() {
  document.getElementById('tv').classList.remove('open');
  if (tvClockTimer) { clearInterval(tvClockTimer); tvClockTimer = null; }
  if (document.fullscreenElement) { try { document.exitFullscreen(); } catch(e){} }
  // autoplay keeps running in the background — the mini carousel stays live
}
function updateTVClock() {
  var el = document.getElementById('tvClock');
  if (el) el.textContent = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}

function dotsHtml(prefix) {
  return tvSlides.map(function(_, i) {
    return '<div class="tv-dot" id="'+prefix+'Dot'+i+'"><div class="tv-dot-fill"></div></div>';
  }).join('');
}
function renderProgressDots() {
  var mini = document.getElementById('miniProgress'); if (mini) mini.innerHTML = dotsHtml('mini');
  var tv = document.getElementById('tvProgress'); if (tv) tv.innerHTML = dotsHtml('tv');
}
function updateProgressState() {
  ['mini','tv'].forEach(function(prefix) {
    tvSlides.forEach(function(_, i) {
      var dot = document.getElementById(prefix+'Dot'+i);
      if (!dot) return;
      dot.classList.remove('done','active');
      var fill = dot.querySelector('.tv-dot-fill');
      fill.style.transition = 'none';
      if (i < tvIndex) { dot.classList.add('done'); fill.style.width = '100%'; }
      else if (i === tvIndex) { dot.classList.add('active'); fill.style.width = '0%'; }
      else { fill.style.width = '0%'; }
    });
  });
}

function slideContentHtml(s) {
  var html = '<div class="tv-slide-hdr"><div class="tv-slide-day">' + s.dayLabel + ' · ' + s.dateLabel + '</div>';
  if (s.empty) {
    html += '</div><div class="tv-empty-day"><div class="tv-empty-day-icon">☕</div><div class="tv-empty-day-text">No jobs scheduled ' + s.dayLabel.toLowerCase() + '.</div></div>';
    return html;
  }
  html += '<div class="tv-slide-tech"><div class="tv-slide-tech-avatar">' + initials(s.tech) + '</div>' + s.tech + '<span class="tv-slide-count">' + s.jobs.length + ' stop' + (s.jobs.length!==1?'s':'') + ' today</span></div></div>';
  html += '<div class="tv-body"><div class="tv-jobs">';
  s.jobs.forEach(function(j) {
    html += '<div class="tv-job-card">';
    html += '<div class="tv-job-time">' + (j.time||'') + '</div>';
    html += '<div class="tv-job-cust">' + (j.customer||'') + '</div>';
    if (j.address) html += '<div class="tv-job-addr">📍 ' + j.address + '</div>';
    html += '<div class="tv-job-meta">' + (j.type ? '<span class="tv-job-type">'+j.type+'</span>' : '') + '</div>';
    if (j.notes) html += '<div class="tv-job-notes">' + j.notes + '</div>';
    html += '</div>';
  });
  html += '</div><div class="tv-map">';
  var mapUrl = mapEmbedUrl(s.stops);
  html += mapUrl
    ? '<iframe src="'+mapUrl+'" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>'
    : '<div class="tv-map-empty">No addresses to map</div>';
  html += '</div></div>';
  return html;
}

function renderCurrentSlide() {
  if (!tvSlides.length) { setSlideContainers('<div class="tv-empty-day"><div class="tv-empty-day-icon">🗓️</div><div class="tv-empty-day-text">No jobs scheduled this week.</div></div>'); return; }
  setSlideContainers(slideContentHtml(tvSlides[tvIndex]));
  updateProgressState();
  requestAnimationFrame(function() {
    ['mini','tv'].forEach(function(prefix) {
      var fill = document.querySelector('#'+prefix+'Dot'+tvIndex+' .tv-dot-fill');
      if (fill && tvPlaying) { fill.style.transition = 'width ' + TV_SLIDE_MS + 'ms linear'; fill.style.width = '100%'; }
    });
  });
}

function slideNext() { tvIndex = (tvIndex + 1) % tvSlides.length; renderCurrentSlide(); if (tvPlaying) startTVAutoplay(); }
function slidePrev() { tvIndex = (tvIndex - 1 + tvSlides.length) % tvSlides.length; renderCurrentSlide(); if (tvPlaying) startTVAutoplay(); }
function startTVAutoplay() {
  stopTVAutoplay();
  tvAdvanceTimer = setInterval(function() { tvIndex = (tvIndex+1) % tvSlides.length; renderCurrentSlide(); }, TV_SLIDE_MS);
}
function stopTVAutoplay() { if (tvAdvanceTimer) { clearInterval(tvAdvanceTimer); tvAdvanceTimer = null; } }
function slideTogglePlay() {
  tvPlaying = !tvPlaying;
  var icon = tvPlaying ? '⏸' : '▶';
  var miniBtn = document.getElementById('miniPlayBtn'); if (miniBtn) miniBtn.textContent = icon;
  var tvBtn = document.getElementById('tvPlayBtn'); if (tvBtn) tvBtn.textContent = icon;
  var miniArrows = document.getElementById('miniArrows'); if (miniArrows) miniArrows.classList.toggle('show', !tvPlaying);
  var tvArrows = document.getElementById('tvArrows'); if (tvArrows) tvArrows.classList.toggle('show', !tvPlaying);
  if (tvPlaying) { startTVAutoplay(); renderCurrentSlide(); } else { stopTVAutoplay(); updateProgressState(); }
}
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('tv').classList.contains('open')) return;
  if (e.key === 'Escape') closeTVMode();
  else if (e.key === ' ') { e.preventDefault(); slideTogglePlay(); }
  else if (e.key === 'ArrowRight' && !tvPlaying) slideNext();
  else if (e.key === 'ArrowLeft' && !tvPlaying) slidePrev();
});

function updateClock() {
  var now = new Date();
  var h = now.getHours();
  document.getElementById('clockTime').textContent = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  var greet = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').innerHTML = greet + ', <span>team</span>.';
}
updateClock();
setInterval(updateClock, 30000);
</script>
</body>
